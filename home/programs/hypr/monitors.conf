# vim: ft=hyprlang

# Monitors
monitor=DP-3, preferred, 0x0, 1.25
monitor=DP-2, preferred, auto, 1.25
exec-once = sleep 1; wlr-randr --output DP-3 --mode 2560x1440@75.032997Hz
exec-once = sleep 1; wlr-randr --output DP-2 --mode 2560x1440@75.032997Hz

# workspace binding
workspace=1, monitor:DP-3, persistent:true
workspace=11, monitor:DP-2, persistent:true
workspace=2, monitor:DP-3, persistent:true
workspace=12, monitor:DP-2, persistent:true
workspace=3, monitor:DP-3, persistent:true
workspace=13, monitor:DP-2, persistent:true
workspace=4, monitor:DP-3, persistent:true
workspace=14, monitor:DP-2, persistent:true
workspace=5, monitor:DP-3, persistent:true
workspace=15, monitor:DP-2, persistent:true
workspace=6, monitor:DP-3
workspace=16, monitor:DP-2
workspace=7, monitor:DP-3
workspace=17, monitor:DP-2
workspace=8, monitor:DP-3
workspace=18, monitor:DP-2
workspace=9, monitor:DP-3
workspace=19, monitor:DP-2
workspace=10, monitor:DP-3
workspace=110, monitor:DP-2


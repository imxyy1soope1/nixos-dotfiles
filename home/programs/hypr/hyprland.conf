# Monitors
source = ~/.config/hypr/monitors.conf

# General settings
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    col.active_border = rgba(6186d6ee) rgba(cba6f7ee) 90deg
    # col.inactive_border = rgba(595959aa) rgba(cba6f7aa) 90deg
    col.inactive_border = rgba(2e2e3eee)
    layout = dwindle
}

decoration {
    rounding = 20
    drop_shadow = no
    shadow_range = 125
    shadow_render_power = 4
    col.shadow = 0x44000000
    col.shadow_inactive=0x33000000
    blur {
        enabled = true
        size = 4
        passes = 4
        new_optimizations = true
        xray = false
        ignore_opacity = true
        special = true
    }
    dim_special = 0
}

animations {
    enabled = yes
    bezier = overshot,0.13,0.99,0.29,1.1
    bezier = workspace, 0, 1.11, 0.6, 1.01
    animation = windowsOut, 1, 5, overshot, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = windows,1,5,overshot,slide
    animation = windowsMove, 1, 5, overshot, 
    animation = fade,1,10,default
    animation = workspaces,1,5,workspace,slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.9
}

master {
    new_is_master = true
    orientation = left
    special_scale_factor = 0.9
}

gestures {
    workspace_swipe = off
}

xwayland {
    # Avoid annoying xwayland scaling on HiDPI monitors
    force_zero_scaling = true
}

misc {
    enable_swallow = true
    swallow_regex = ^(Alacritty|ft)$
    new_window_takes_over_fullscreen = 2
    force_default_wallpaper = 0
}

# Rules
source = ~/.config/hypr/rules.conf

# Keybinds
source = ~/.config/hypr/keybinds.conf

# Execs
source = ~/.config/hypr/execs.conf

# Envs
source = ~/.config/hypr/envs.conf

